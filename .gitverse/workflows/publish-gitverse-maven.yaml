name: Publish to GitVerse Maven

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install Maven
        run: |
          apt-get update
          apt-get -y install maven

      - name: Configure Maven settings for GitVerse
        run: |
          mkdir -p ~/.m2
          cat <<'EOF' > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>gitverse</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>token ${env.GITVERSE_MAVEN_TOKEN}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITVERSE_MAVEN_TOKEN: ${{ secrets.GITVERSE_MAVEN_TOKEN }}

      - name: Publish package
        run: mvn -B deploy
